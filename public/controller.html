<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Synapse Controller</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="controller-body">
  <main class="controller">
    <header>
      <p class="eyebrow">Your Synapse</p>
      <h1 id="controller-title">Connecting…</h1>
      <p id="controller-status" class="lede subtle">Hold tight while we reserve a synapse for you.</p>
    </header>

    <div class="controller-card" id="controller-card">
      <div class="synapse-tag" id="synapse-tag">--</div>
      <div class="mini-stats">
        <span id="receptor-label"></span>
        <span id="session-label"></span>
      </div>

      <div class="control-list">
        <div class="control">
          <label>Ca++ permeability <span id="ca-label"></span></label>
          <input id="ca-slider" type="range" min="0" max="2" step="0.05" value="0.5" />
        </div>
        <div class="control">
          <label>Probability of release <span id="prel-label"></span></label>
          <input id="prel-slider" type="range" min="0" max="1" step="0.02" value="0.5" />
        </div>
        <div class="control">
          <label>Number of synapses <span id="nsyn-label"></span></label>
          <input id="nsyn-slider" type="range" min="1" max="10" step="1" value="1" />
        </div>
        <div class="control">
          <label>Quantal response <span id="quantal-label"></span></label>
          <input id="quantal-slider" type="range" min="0.1" max="5" step="0.05" value="1" />
        </div>
      </div>

      <button id="fire-btn" disabled>Fire spike</button>
      <div class="mini-stats">
        <span id="latency-label"></span>
      </div>
    </div>

    <section class="mini-help">
      <p>Each tap fires an activation on your synapse. Rapid taps send faster bursts. If you leave, someone else can claim your synapse.</p>
    </section>
  </main>

  <script type="module" src="/js/controller.js"></script>
</body>
</html>
